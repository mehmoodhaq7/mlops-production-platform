name: MLOps CI

on:
  workflow_dispatch:
    inputs:
      run_all:
        description: "Run all jobs"
        required: false
        default: "true"
      run_data_processing:
        description: "Run data processing job"
        required: false
        default: "false"
      run_model_training:
        description: "Run model training job"
        required: false
        default: "false"
      run_build_and_publish:
        description: "Run build and publish job"
        required: false
        default: "false"

jobs:
  data-processing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data processing
        run: |
          python src/data/run_processing.py \
            --input data/raw/house_data.csv \
            --output data/processed/cleaned_house_data.csv

      - name: Do feature engineering
        run: |
          python src/features/engineer.py \
            --input data/processed/cleaned_house_data.csv \
            --output data/processed/featured_house_data.csv \
            --preprocessor models/trained/preprocessor.pkl

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/featured_house_data.csv

      - name: Upload preprocessor
        uses: actions/upload-artifact@v4
        with:
          name: preprocessor
          path: models/trained/preprocessor.pkl

  model-training:
    needs: data-processing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Setup MLflow
        run: |
          docker pull ghcr.io/mlflow/mlflow:latest
          docker run -d -p 5000:5000 --name mlflow-server ghcr.io/mlflow/mlflow:latest mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///mlflow.db

      - name: Wait for MLflow to start
        run: |
          for i in {1..10}; do
            curl -f http://localhost:5000/health && break || sleep 5;
          done

      - name: Train model
        run: |
          mkdir -p models
          python src/models/train_model.py \
            --config configs/model_config.yaml \
            --data data/processed/featured_house_data.csv \
            --models-dir models \
            --mlflow-tracking-uri http://localhost:5000

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Clean up MLflow
        run: |
          docker stop mlflow-server || true
          docker rm mlflow-server || true

  build-and-publish:
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Image Tag
        run: echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      # --- PURANI PIPELINE WALE ARTIFACT PATHS ---
      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Download preprocessor
        uses: actions/download-artifact@v4
        with:
          name: preprocessor
          path: models/trained/
      # -------------------------------------------

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Model Image
        run: |
          docker build -t ${{ vars.DOCKER_USERNAME }}/house-price-model:${{ env.IMAGE_TAG }} -f Dockerfile .
          docker push ${{ vars.DOCKER_USERNAME }}/house-price-model:${{ env.IMAGE_TAG }}

      - name: Build & Push Streamlit Image
        run: |
          docker build -t ${{ vars.DOCKER_USERNAME }}/streamlit:${{ env.IMAGE_TAG }} -f streamlit_app/Dockerfile streamlit_app/
          docker push ${{ vars.DOCKER_USERNAME }}/streamlit:${{ env.IMAGE_TAG }}

      - name: Update Kustomize
        run: |
          cd deployment/kubernetes
          kustomize edit set image ${{ vars.DOCKER_USERNAME }}/house-price-model=${{ vars.DOCKER_USERNAME }}/house-price-model:${{ env.IMAGE_TAG }}
          kustomize edit set image ${{ vars.DOCKER_USERNAME }}/streamlit=${{ vars.DOCKER_USERNAME }}/streamlit:${{ env.IMAGE_TAG }}

      - name: Commit and Push to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment/kubernetes/kustomization.yaml
          git commit -m "chore(ops): update image tags to ${{ env.IMAGE_TAG }} [skip ci]"
          git push origin main
